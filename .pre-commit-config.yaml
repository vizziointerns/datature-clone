repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: backend-ruff
        name: Backend Ruff
        entry: bash -c 'cd backend && ruff check .'
        language: system
        pass_filenames: false
        files: ^backend/
